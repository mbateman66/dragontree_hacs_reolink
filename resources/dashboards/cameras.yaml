##############################################################################
# Dragontree Cameras Dashboard
#
# Views:
#   - Status & Config  — sensor status and storage configuration
#
##############################################################################

views:
  ##########################################################################
  # VIEW: Status & Configuration
  ##########################################################################
  - title: Status & Configuration
    path: status
    icon: mdi:cctv
    cards:

      # ── Recordings Status ─────────────────────────────────────────────
      - type: entities
        title: Recordings
        entities:
          - entity: sensor.dragontree_reolink_total_recordings
            name: Total Recordings
          - entity: sensor.dragontree_reolink_last_download
            name: Last Download
          - entity: sensor.dragontree_reolink_download_queue
            name: Download Queue

      # ── Storage ───────────────────────────────────────────────────────
      - type: entities
        title: Storage
        entities:
          - entity: sensor.dragontree_reolink_disk_used
            name: Disk Used
          - type: attribute
            entity: sensor.dragontree_reolink_disk_used
            attribute: used_percent
            name: Used
            suffix: "%"
          - type: attribute
            entity: sensor.dragontree_reolink_disk_used
            attribute: free_gb
            name: Free
            suffix: " GB"
          - entity: number.dragontree_reolink_max_disk_space
            name: Max Disk Space

  ##########################################################################
  # VIEW: Recording Playback
  ##########################################################################
  - title: Recording Playback
    path: playback
    icon: mdi:play-circle
    panel: true
    cards:
      - type: custom:dragontree-reolink-playback
